<div class="flex gap-6 justify-center my-8">
  @for (unit of units; track unit.label) {
    <div class="flex flex-col items-center">
      <span class="text-4xl font-light text-stone-800">
        {{ unit.value.toString().padStart(2, '0') }}
      </span>
      <span class="text-xs text-stone-400 uppercase tracking-widest mt-1">
        {{ unit.label }}
      </span>
    </div>
  }
</div>
