<div class="flex gap-6 justify-center my-4">
  @for (unit of units; track unit.label) {
    <div class="flex flex-col items-center">
      <span class="text-4xl font-light text-forest">
        {{ unit.value.toString().padStart(2, '0') }}
      </span>
      <span class="text-xs text-text-muted uppercase tracking-widest mt-1.5">
        {{ unit.label }}
      </span>
    </div>
  }
</div>
